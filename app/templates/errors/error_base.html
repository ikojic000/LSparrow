{% extends "base.html" %} {% block title %}Greška {{ code }}{% endblock %} {%
block meta_robots %}<meta name="robots" content="noindex, nofollow" />{%
endblock %} {% block content %}
<!-- Error Header -->
<section class="page-header-gradient relative overflow-visible pt-36 pb-12">
  <div class="max-w-7xl mx-auto px-4 lg:px-8 text-center">
    <h2 class="text-7xl lg:text-9xl font-heading font-bold text-white">
      {{ code }}
    </h2>
  </div>
</section>

<!-- Error Details -->
<section class="py-20 dark:bg-ls-dark-bg">
  <div class="max-w-lg mx-auto px-4 lg:px-8 text-center">
    <div class="mb-6">
      <i class="fas {{ icon }} text-5xl" style="color: {{ color }};"></i>
    </div>
    <h3
      class="text-2xl font-heading font-bold text-slate-800 dark:text-slate-100 mb-3">
      {{ title }}
    </h3>
    <p class="text-ls-muted dark:text-ls-dark-muted mb-8">{{ message }}</p>
    <a
      href="{{ url_for('main.index') }}"
      class="inline-flex items-center gap-2 bg-ls-blue text-white px-8 py-4 rounded-xl font-bold text-sm tracking-wider hover:bg-blue-700 transition-all shadow-sm">
      <i class="fas fa-home"></i>Početna stranica
    </a>
  </div>
</section>
{% endblock %}
